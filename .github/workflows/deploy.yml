name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Build
        run: npm run build
        working-directory: app

      - name: Deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./app/dist/
          server-dir: /public_html/cerebro/
          # state-name изменён 2026-05-26 чтобы форсировать полный re-upload —
          # старый state-file заглючил и incremental sync пропускал обновления
          # (Actions показывали success, но файлы на сервере не обновлялись).
          state-name: .ftp-deploy-sync-state-v2.json
          exclude: |
            **/.git*
            **/.git*/**
